name: Post Result
description: Submit a new typing test result (requires auth)
method: POST
url: http://localhost:3000/api/results
body:
  content: |-
    {
      "wpm": 85.50,
      "timeElapsed": 30.00,
      "accuracy": 97.25,
      "mode": "timed",
      "modeValue": 30,
      "correct": 120,
      "incorrect": 4
    }
headers:
- name: Content-Type
  value: application/json
options:
  attach_cookies: true
